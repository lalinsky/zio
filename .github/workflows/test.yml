name: CI

on:
  push:
    branches: [ main ]
    tags:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        zig_version: ['0.16.0']
        mode: [debug, release]
        config:
          # DEBUG (iocp-debug branch): Windows/IOCP only for fast iteration on #530.
          - { os: windows-latest, target: native, backends: 'iocp' }

    runs-on: ${{ matrix.config.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Zig
      uses: mlugg/setup-zig@v2
      with:
        version: ${{ matrix.zig_version }}

    - name: Install QEMU
      if: matrix.config.qemu
      run: |
        sudo apt-get update -q -y
        sudo apt-get install -q -y qemu-user-static

    # DEBUG (iocp-debug branch): build the cross-loop test once, then run it in a
    # loop to raise the chance of hitting the flaky #530 stall. Stops on first
    # failure so the STALL/LATE warn lines are the tail of the log.
    - name: Build and loop the cross-loop test
      shell: bash
      run: |
        zig build test -Dbackend=iocp \
          ${{ matrix.mode == 'release' && '-Doptimize=ReleaseSafe' || '' }} \
          -Dtest-filter="iocp repro: AcceptEx double-completion" \
          -Demit-test-bin
        BIN=$(ls zig-out/bin/test* | head -1)
        echo "Looping $BIN"
        for i in $(seq 1 6); do
          echo "=== iteration $i ==="
          "$BIN" || { echo "FAILED on iteration $i"; exit 1; }
        done
      timeout-minutes: 15
      env:
        TEST_VERBOSE: 2

    - name: Run tests (FreeBSD VM)
      if: matrix.config.vm == 'freebsd'
      uses: vmactions/freebsd-vm@v1
      timeout-minutes: 20
      with:
        envs: 'TEST_VERBOSE'
        run: |
          for test in zig-out/bin/test-*; do
            echo "Running $test"
            ./$test
          done
      env:
        TEST_VERBOSE: 2

    - name: Run tests (NetBSD VM)
      if: matrix.config.vm == 'netbsd'
      uses: vmactions/netbsd-vm@v1
      timeout-minutes: 20
      with:
        release: '10.1'
        envs: 'TEST_VERBOSE'
        run: |
          for test in zig-out/bin/test-*; do
            echo "Running $test"
            ./$test
          done
      env:
        TEST_VERBOSE: 2
